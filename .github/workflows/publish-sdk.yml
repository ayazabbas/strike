name: Publish SDK to crates.io

on:
  push:
    tags:
      - 'sdk-v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('sdk/rust/Cargo.lock') }}

      - name: Build
        working-directory: sdk/rust
        run: cargo build

      - name: Test
        working-directory: sdk/rust
        run: cargo test

      - name: Clippy
        working-directory: sdk/rust
        run: cargo clippy -- -D warnings

      - name: Check docs
        working-directory: sdk/rust
        run: cargo doc --no-deps

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        working-directory: sdk/rust
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sdk-v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) doesn't match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Publishing strike-sdk v$CARGO_VERSION"

      - name: Publish to crates.io
        working-directory: sdk/rust
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
